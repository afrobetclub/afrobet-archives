<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AfroBet Club — Performance Embed</title>
  <link rel="stylesheet" href="./embed.css?v=15" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <main class="performance-widget">
    <section class="kpis">
      <article><small>Profit total</small><span id="profitTotal">—</span></article>
      <article><small>Win rate</small><span id="winRate">—</span></article>
      <article><small>ROI</small><span id="roi">—</span></article>
      <article><small>Number of tips</small><span id="numberTips">—</span></article>
      <article><small>Average odds</small><span id="averageOdds">—</span></article>
    </section>

    <section class="chart-card">
      <div class="chart-head">
        <span>Historical performance since 2022</span>
        <span class="legend">Profit cumulé jour par jour</span>
      </div>
      <div class="chart-box">
        <canvas id="dailyChart"></canvas>
      </div>
    </section>

    <section class="embed-bottom">
      <p>Chaque sélection est enregistrée, suivie puis archivée.<br>La confiance vient du temps, pas de la promesse.</p>
      <a href="https://archives.afrobet.club/" rel="noopener">Consulter les archives complètes →</a>
    </section>
  </main>
  <script src="./embed.js?v=15"></script>
</body>
</html>
