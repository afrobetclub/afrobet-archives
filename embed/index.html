<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AfroBet Club — Home Embed</title>
  <link rel="stylesheet" href="./embed.css?v=1" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <main class="performance-widget">
    <section class="kpis" aria-label="AfroBet performance summary">
      <article>
        <small>Profit total</small>
        <span id="profitTotal">—</span>
      </article>
      <article>
        <small>Win rate</small>
        <span id="winRate">—</span>
      </article>
      <article>
        <small>Number of tips</small>
        <span id="numberTips">—</span>
      </article>
      <article>
        <small>Average odds</small>
        <span id="averageOdds">—</span>
      </article>
    </section>

    <section class="chart-card" aria-label="AfroBet cumulative profit since 2022">
      <div class="chart-head">
        <span>Historical performance since 2022</span>
      </div>
      <div class="chart-box">
        <canvas id="monthlyChart"></canvas>
      </div>
    </section>
  </main>

  <script src="./embed.js?v=1"></script>
</body>
</html>
